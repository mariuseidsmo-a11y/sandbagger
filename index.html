/* ── KAPALUA DESIGN TOKENS ─────────────────────────────────── */
:root {
  --bg:         #080808;
  --card:       #111111;
  --card-alt:   #1A1A1A;
  --border:     #222222;
  --border2:    #2A2A2A;
  --text:       #F0F0F0;
  --text2:      #888888;
  --text3:      #555555;
  --muted:      #888888;
  --muted-dim:  #555555;
  --accent:     #C5B89A;
  --accent-dk:  #9C8E72;
  --accent-bg:  rgba(197,184,154,0.07);
  --accent-border: rgba(197,184,154,0.22);
  --accent-text:#080808;
  --gold:       #D4A961;
  --amber:      #D4A961;
  --amber-bg:   rgba(212,169,97,0.07);
  --amber-border:rgba(212,169,97,0.22);
  --red:        #C95444;
  --red-bg:     rgba(201,84,68,0.07);
  --red-border: rgba(201,84,68,0.22);
  --blue:       #5A8FB8;
  --blue-bg:    rgba(90,143,184,0.07);
  --blue-border:rgba(90,143,184,0.22);
  --green:      #7FA888;
  --bg2:        #111111;
  --bg3:        #1A1A1A;
  --radius:     16px;
  --radius-sm:  10px;
  --glow:       0 0 32px rgba(197,184,154,0.18);
  --glow-strong:0 0 48px rgba(197,184,154,0.22);
}

*{box-sizing:border-box;margin:0;padding:0;}
*{-webkit-tap-highlight-color:rgba(197,184,154,0.08);}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  padding:0 0 6rem;
  min-height:100vh;
  font-size:16px;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
}

/* Thin accent top bar */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;height:2px;
  background:var(--accent);z-index:100;opacity:0.6;
}

/* ── CINEMATIC PHOTO BACKGROUND ─────────────────────────────── */
.photo-bg{
  position:fixed;top:0;left:0;right:0;z-index:0;overflow:hidden;
  background:var(--bg);
  /* Stabil høyde: inset:0/100vh følger den dynamiske viewporten, så når
     mobilens adresselinje skjules/vises under skrolling endrer den fikserte
     bakgrunnen størrelse og cover-bildet re-skaleres ("zoom-hopp"). 100lvh
     er den store, konstante viewport-høyden → bakgrunnen står helt stille. */
  height:100vh;        /* fallback for eldre nettlesere */
  height:100lvh;
}
.photo-bg img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:50% 55%;
  animation:kenburns 28s ease-in-out infinite alternate;
}
@keyframes kenburns{
  from{transform:scale(1.06);}
  to{transform:scale(1.16) translate(1%, 1%);}
}
.photo-bg .grade{position:absolute;inset:0;}
.photo-bg .vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 35%, transparent 0%, transparent 45%, rgba(0,0,0,0.55) 100%);
}
.photo-bg .grain{
  position:absolute;inset:0;opacity:0.10;
  mix-blend-mode:overlay;
  background-size:240px;
}
.photo-bg .topbar{
  position:absolute;top:0;left:0;right:0;height:90px;
  background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0) 100%);
}

/* Grades */
.grade-morning{
  background:linear-gradient(180deg, rgba(20,32,42,0.18) 0%, rgba(8,12,16,0.0) 35%, rgba(2,4,6,0.78) 100%);
}
.grade-morning ~ img, img.grade-morning{
  filter:brightness(0.62) saturate(1.05) contrast(1.05);
}
.grade-midday{
  background:linear-gradient(180deg, rgba(14,24,34,0.22) 0%, rgba(4,8,10,0.05) 35%, rgba(2,4,6,0.86) 100%);
}
.grade-afternoon{
  background:linear-gradient(180deg, rgba(28,22,16,0.18) 0%, rgba(8,6,4,0.05) 35%, rgba(2,3,4,0.82) 100%);
}
.grade-sunset{
  background:linear-gradient(180deg, rgba(48,28,14,0.18) 0%, rgba(20,10,4,0.10) 40%, rgba(4,3,2,0.86) 100%);
}

/* Content above photo */
.screen-content{
  position:relative;z-index:1;
  padding:64px 20px 80px;
  min-height:100vh;
}

/* ── CARDS ───────────────────────────────────────────────────── */
.card{
  background:#111111;
  border:1px solid #2a2a2a;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  position:relative;
}
.ci{border-color:rgba(90,143,184,0.4);background:#0d1520;}
.cw{border-color:rgba(212,169,97,0.4);background:#191000;}
.cs{border-color:rgba(197,184,154,0.35);background:#141210;box-shadow:var(--glow);}
.cd{border-color:rgba(201,84,68,0.45);background:#150808;}

/* ── TYPOGRAPHY ──────────────────────────────────────────────── */
.display{
  font-family:'Bebas Neue',Impact,sans-serif;
  line-height:0.9;letter-spacing:0.005em;
}
.eyebrow{
  font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent);font-weight:500;font-family:'Inter',sans-serif;
}
.eyebrow::before{content:"// ";}
.label-text{
  font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--muted);font-weight:500;font-family:'Inter',sans-serif;
}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn{
  display:block;width:100%;
  padding:16px;font-size:16px;font-weight:600;
  background:var(--card-alt);color:var(--muted);
  border:1px solid var(--border);border-radius:16px;
  margin-top:10px;text-align:center;min-height:52px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.1s;
}
.btnp{
  background:#C5B89A;color:#0A0A0A;border:none;
  font-size:16px;font-weight:800;
  box-shadow:0 0 40px rgba(197,184,154,0.3),0 4px 16px rgba(0,0,0,0.4);
  min-height:56px;border-radius:16px;
  letter-spacing:0.03em;
}
.btnp:active,.btn:active{transform:scale(0.98);}

.btnback{
  background:rgba(197,184,154,0.15);
  border:1.5px solid rgba(197,184,154,0.5);
  border-radius:20px;
  color:var(--accent);
  font-size:12px;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:16px;padding:7px 16px;
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  font-family:'Inter',sans-serif;
}
.bsm{
  padding:9px 16px;font-size:13px;font-weight:500;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--muted);border-radius:50px;cursor:pointer;
  min-height:40px;font-family:'Inter',sans-serif;transition:all 0.1s;
}
.bon{background:rgba(90,143,184,0.1);color:var(--blue);border-color:rgba(90,143,184,0.3);}
.bsc{background:#1e1a14;color:#C5B89A;border-color:#5a5040;box-shadow:0 0 16px rgba(197,184,154,0.2);}
.bwa{background:#1e1400;color:#D4A961;border-color:#5a4010;}
.bda{background:#1e0a08;color:#C95444;border-color:#5a2010;}

/* ── FORM ────────────────────────────────────────────────────── */
input,select{
  width:100%;padding:13px 14px;
  border:1px solid var(--border);border-radius:10px;
  font-size:15px;font-family:'Inter',sans-serif;font-weight:400;
  background:var(--card-alt);color:var(--text);
  outline:none;transition:border-color 0.15s;min-height:48px;
}
input:focus,select:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted-dim);}
select option{background:var(--card);}
button{cursor:pointer;font-family:'Inter',sans-serif;}

/* ── LAYOUT ──────────────────────────────────────────────────── */
.lbl{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pill{display:inline-block;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:50px;font-size:11px;font-weight:600;gap:3px;background:var(--card-alt);border:1px solid var(--border);}
.prog-track{height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;border-radius:1px;background:var(--accent);transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
.score-num{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── POLISH & MOTION LAYER ───────────────────────────────────────
   Refined easing, entrance motion, focus & press feedback.
   Builds on the Kapalua tokens — same dark + gold identity. */
:root{
  --ease:cubic-bezier(0.32,0.72,0,1);      /* smooth, faintly springy */
  --ease-out:cubic-bezier(0.22,1,0.36,1);  /* decelerate-in */
  --t-fast:0.14s;
  --t-med:0.30s;
}

html{scroll-behavior:smooth;}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}

/* Entrance motion — cards rise in softly when first mounted.
   React reuses DOM nodes across re-renders, so this fires once per
   mount (screen change / new list item), never on a data tick. */
@keyframes sb-rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes sb-fade{from{opacity:0;}to{opacity:1;}}

.card{
  animation:sb-rise var(--t-med) var(--ease-out) both;
  transition:border-color var(--t-med) var(--ease),
             box-shadow var(--t-med) var(--ease),
             transform var(--t-fast) var(--ease);
}
/* Gentle stagger for sibling cards within a screen — degrades to
   "all together" if the markup doesn't line up, which is fine. */
.card:nth-child(2){animation-delay:0.04s;}
.card:nth-child(3){animation-delay:0.08s;}
.card:nth-child(4){animation-delay:0.12s;}
.card:nth-child(5){animation-delay:0.16s;}
.card:nth-child(n+6){animation-delay:0.2s;}

/* Universal press feedback + smooth state colour changes for the
   many inline-styled buttons throughout the app. */
button{transition:transform var(--t-fast) var(--ease),
                  border-color var(--t-fast) var(--ease),
                  background-color var(--t-fast) var(--ease),
                  color var(--t-fast) var(--ease),
                  box-shadow var(--t-fast) var(--ease);}
button:active{transform:scale(0.97);}
button:disabled{transform:none;}

/* Card used as a button — lift on hover, press in on tap */
button.card:active{transform:scale(0.985);}

/* Pointer-only hover affordances (no sticky :hover on touch) */
@media (hover:hover){
  .btn:hover{border-color:var(--border2);color:var(--text);}
  .btnp:hover{transform:translateY(-1px);box-shadow:0 0 48px rgba(197,184,154,0.4),0 8px 22px rgba(0,0,0,0.45);}
  .bsm:hover{border-color:var(--accent-border);color:var(--text);}
  button.card:hover{border-color:var(--accent-border);transform:translateY(-1px);}
  .btnback:hover{background:rgba(197,184,154,0.22);}
}

/* Primary button transition (was transition:all 0.1s linear) */
.btnp{transition:transform var(--t-fast) var(--ease),box-shadow var(--t-med) var(--ease);}
.btnp:active,.btn:active{transform:scale(0.98);}

/* Touch targets — keep tap area comfortable (≥40–44px) */
.bsm{min-height:44px;}
.btnback{min-height:40px;padding:9px 18px;}

/* Keyboard focus — visible accent ring, none for mouse/touch */
button:focus-visible,a:focus-visible,[tabindex]:focus-visible,
input:focus-visible,select:focus-visible,summary:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;
}
button:focus:not(:focus-visible){outline:none;}

/* Inputs — soft focus glow on top of the existing accent border */
input:focus,select:focus{box-shadow:0 0 0 3px var(--accent-bg);}

/* Screen-to-screen transition — a keyed remount per screen replays
   this (the AnimatePresence effect, done with pure CSS). */
@keyframes sb-screen-in{from{opacity:0;}to{opacity:1;}}
.sb-screen{animation:sb-screen-in 0.26s var(--ease-out) both;}

/* Spinner for async work */
@keyframes sb-spin{to{transform:rotate(360deg);}}
.sb-spinner{
  display:inline-block;width:16px;height:16px;vertical-align:-3px;margin-right:8px;
  border:2px solid var(--accent-border);border-top-color:var(--accent);
  border-radius:50%;animation:sb-spin 0.7s linear infinite;
}

/* Skeleton shimmer — placeholder while data loads (no layout shift) */
@keyframes sb-shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}
.sb-skeleton{
  border-radius:8px;
  background:linear-gradient(100deg,var(--card-alt) 30%,rgba(197,184,154,0.12) 50%,var(--card-alt) 70%);
  background-size:220% 100%;animation:sb-shimmer 1.3s ease-in-out infinite;
}

/* Score number pop — keyed on the value, so it replays on every change */
@keyframes sb-pop{0%{transform:scale(0.55);opacity:0.3;}55%{transform:scale(1.14);}100%{transform:scale(1);opacity:1;}}
.sb-score-pop{display:inline-block;animation:sb-pop 0.32s var(--ease-out);}

/* Hole winner — soft gold breathing glow */
@keyframes sb-glow{
  0%,100%{box-shadow:0 0 0 1px var(--accent-border),0 0 13px rgba(197,184,154,0.10);}
  50%{box-shadow:0 0 0 1px var(--accent-border),0 0 22px rgba(197,184,154,0.26);}
}
.sb-winner{animation:sb-glow 2.4s ease-in-out infinite;}

/* Respect reduced-motion: kill entrance, Ken Burns, and smooth scroll */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.001ms!important;animation-iteration-count:1!important;
    transition-duration:0.001ms!important;scroll-behavior:auto!important;
  }
  html{scroll-behavior:auto;}
  .photo-bg img{animation:none!important;transform:scale(1.06)!important;}
}

function wid(drinks,w,fem){
  const r=fem?0.55:0.68,now=Date.now();let b=0;
  (drinks||[]).forEach(d=>{const hr=(now-d.time)/3600000;b+=(d.units*10)/(w*r)-0.15*hr;});
  return Math.max(0,Math.round(Math.max(0,b)*100)/100);

async function syncSave(rc, state){
  if(!rc)return;
  try{
    const key="sandbagger_"+rc.replace(/[^A-Z0-9]/g,"");
    await fetch("https://kvdb.io/"+KVDB_BUCKET+"/"+key,{

// Lagres i kvdb under én felles nøkkel. Skanner én person en bane, får alle den.
const KVDB_COURSES_KEY="courses_no_v1";
async function loadSharedCourses(){
  try{
    const r=await fetch("https://kvdb.io/"+KVDB_BUCKET+"/"+KVDB_COURSES_KEY);
    if(!r.ok)return [];
    const d=await r.json();
    return Array.isArray(d)?d:[];
  }catch(e){return [];}
}
async function saveSharedCourse(course){
  try{
    const cur=await loadSharedCourses();
    const nm=(course.name||"").toLowerCase().trim();
    const next=[course,...cur.filter(c=>c.id!==course.id&&(c.name||"").toLowerCase().trim()!==nm)].slice(0,1000);
    await fetch("https://kvdb.io/"+KVDB_BUCKET+"/"+KVDB_COURSES_KEY,{
      method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(next)
    });
    return next;
  }catch(e){return null;}
}

function isOver18(dateStr){
  if(!dateStr)return false;
  const bd=new Date(dateStr),td=new Date();
  let age=td.getFullYear()-bd.getFullYear();
  const m=td.getMonth()-bd.getMonth();
  if(m<0||(m===0&&td.getDate()<bd.getDate()))age--;
  return age>=18;
}

                onClick:()=>{
                  const pool=RULE_CHANGE_ALL[rcDifficulty]||RULE_CHANGE;
                  const used=new Set(Object.values(rcOverrides).concat(rcRules.slice(0,hole)));
                  const available=pool.filter(r=>!used.has(r));
                  const nr=available.length>0?available[Math.floor(Math.random()*available.length)]:pool[Math.floor(Math.random()*pool.length)];
                  setRcOverrides(prev=>({...prev,[hole]:nr}));
                  setRcRerolls(prev=>({...prev,[hole]:[]}));
                  
                },
                style:{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid rgba(201,84,68,0.5)",
                  background:"rgba(201,84,68,0.08)",color:"var(--red)"}
              },"🔄 Bytt regel"),
              h("button",{
                onClick:pullAiRule,
                disabled:rcAiLoading,
                style:{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,cursor:rcAiLoading?"default":"pointer",
                  border:"1.5px solid rgba(201,84,68,0.6)",
                  background:rcAiLoading?"var(--bg3)":"rgba(201,84,68,0.15)",color:"var(--red)"}
              },rcAiLoading?"🤖 Lager regel...":"🤖 Ny AI-regel"),
              h("button",{
                onClick:()=>{
                  // Show custom input by marking allVoted
                  setRcRerolls(prev=>({...prev,[hole]:players.map(p=>p.id)}));
                },
                style:{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid var(--border2)",
                  background:"var(--bg3)",color:"var(--muted)"}
              },"✏️ Lag egen")
            ),
            // MULTI DEVICE GUEST: vote system
            !isHost&&!allVoted&&h("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:6}},
              h("button",{
                onClick:()=>{
                  const pid=prof?prof.id:"p"+Date.now();
                  if(votes.includes(pid))return;
                  setRcRerolls(prev=>({...prev,[hole]:[...(prev[hole]||[]),pid]}));
                },
                disabled:myVoted,
                style:{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,
                  cursor:myVoted?"default":"pointer",
                  border:"1.5px solid "+(myVoted?"var(--border2)":"rgba(201,84,68,0.5)"),
                  background:myVoted?"var(--bg3)":"rgba(201,84,68,0.08)",
                  color:myVoted?"var(--muted)":"var(--red)"}
              },myVoted?"✓ Du stemte":"🔄 For urealistisk? Stem ny regel"),
              votes.length>0&&h("span",{style:{fontSize:11,color:"var(--muted)"}},
                votes.length+"/"+players.length+" stemmer")
            ),
            allVoted&&h("div",{style:{padding:"10px 12px",background:"rgba(201,84,68,0.12)",borderRadius:8,border:"1px solid rgba(201,84,68,0.35)",marginTop:6}},
              h("p",{style:{fontSize:12,fontWeight:800,color:"var(--red)",margin:"0 0 8px"}},"🗳️ Alle enige! Velg:"),
              h("button",{
                onClick:()=>{
                  const pool=RULE_CHANGE_ALL[rcDifficulty]||RULE_CHANGE;
                  const used=new Set(Object.values(rcOverrides).concat(rcRules.slice(0,hole)));
                  const available=pool.filter(r=>!used.has(r));
                  const nr=available.length>0?available[Math.floor(Math.random()*available.length)]:pool[Math.floor(Math.random()*pool.length)];
                  setRcOverrides(prev=>({...prev,[hole]:nr}));
                  setRcRerolls(prev=>({...prev,[hole]:[]}));
                  
                },
                style:{width:"100%",padding:"9px",borderRadius:8,border:"1.5px solid rgba(201,84,68,0.4)",
                  background:"rgba(201,84,68,0.08)",color:"var(--red)",fontWeight:800,
                  fontSize:12,cursor:"pointer",marginBottom:8}
              },"🎲 Trekk tilfeldig ny regel"),
              h("button",{
                onClick:pullAiRule,
                disabled:rcAiLoading,
                style:{width:"100%",padding:"9px",borderRadius:8,border:"1.5px solid rgba(201,84,68,0.6)",
                  background:rcAiLoading?"var(--bg3)":"rgba(201,84,68,0.15)",color:"var(--red)",fontWeight:800,
                  fontSize:12,cursor:rcAiLoading?"default":"pointer",marginBottom:8}
              },rcAiLoading?"🤖 Lager fersk regel...":"🤖 Generer fersk AI-regel"),
              h("p",{style:{fontSize:11,color:"var(--muted)",textAlign:"center",marginBottom:6}},"— eller skriv din egen —"),
              h("div",{style:{display:"flex",gap:6}},
                h("input",{
                  ref:rcInputRef,
                  type:"text",
                  defaultValue:"",
                  placeholder:"Eks: Alle putter med hatten...",
                  autoComplete:"off",
                  style:{flex:1,fontSize:12,padding:"9px 10px",borderRadius:8,
                    border:"1.5px solid rgba(201,84,68,0.35)",background:"var(--bg2)",
                    color:"var(--text)",fontFamily:"Inter,sans-serif",outline:"none"}
                }),
                h("button",{
                  onClick:()=>{
                    const rule=(rcInputRef.current?.value||"").trim();
                    if(!rule)return;
                    setRcOverrides(prev=>({...prev,[hole]:rule}));
                    setRcRerolls(prev=>({...prev,[hole]:[]}));
                    if(rcInputRef.current)rcInputRef.current.value="";
                  },
                  style:{padding:"9px 14px",borderRadius:8,border:"1.5px solid rgba(201,84,68,0.4)",
                    background:"rgba(201,84,68,0.15)",color:"var(--red)",
                    fontWeight:800,fontSize:14,cursor:"pointer"}
                },"✓")
              )
            )
          ),
          // Previous rules (collapsed toggle)
          activeRules.length>1&&h("details",{style:{marginTop:4}},
            h("summary",{style:{fontSize:12,color:"var(--red)",cursor:"pointer",fontWeight:600,listStyle:"none",padding:"4px 0"}},
              "▼ Alle "+activeRules.length+" aktive regler"
            ),
            h("div",{style:{marginTop:8,paddingLeft:8}},
              activeRules.map((r,i)=>h("div",{key:i,style:{display:"flex",gap:8,padding:"4px 0",borderBottom:"1px solid rgba(201,84,68,0.15)"}},
                h("span",{style:{fontSize:11,color:"var(--red)",fontWeight:800,minWidth:20}},(i+1)+"."),
                h("span",{style:{fontSize:12,color:i===hole-1?"#fff":"rgba(240,240,240,0.6)",fontWeight:i===hole-1?700:400}},r,i===hole-1&&h("span",{style:{marginLeft:6,fontSize:10,color:"var(--red)"}},"← denne"))
              ))
            )
          ),
          info
        );
      }

      if(gid==="wolf"){
        // Wolf rotates: player at index (hole-1) % players.length is Wolf this hole
        const autoWolfIdx=(hole-1)%players.length;
        const wolfPl=players[autoWolfIdx];
        
        // Per-hole wolf decisions stored as wolfHoles: {hole: {par:pid|null, lone:bool}}
        const hDecision=wolfHoles?.[hole]||{};
        const thisWolfPar=hDecision.par||null;
        const thisWolfLone=hDecision.lone||false;
        
        const setHoleDecision=(par,lone)=>{
          setWolfHoles(prev=>({...prev,[hole]:{par,lone}}));
        };
        
        // Wolf-standings — bruker SAMME autoritative beregning som sluttoppgjøret
        // (wolfT er nullsum-korrekt og netto-aware via netFor). Én sannhet, ingen avvik.
        const wolfScores=wolfT();
        
        const nextWolf=players[(hole)%players.length];
        
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,
              h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:"0 0 2px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🐺 WOLF"),
              h("p",{style:{fontSize:15,fontWeight:800,color:"#fff",margin:0}},"Hull "+hole+": "+wolfPl?.name.split(" ")[0]+" er Wolf")
            ),
            infoBtn
          ),
          info,
          
          // Partner choice for THIS hole
          !thisWolfPar&&!thisWolfLone&&h("div",{style:{marginBottom:10}},
            h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:8,fontWeight:600}},"🐺 Wolf velger partner etter drives:"),
            h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              players.filter(p=>p.id!==wolfPl?.id).map(p=>h("button",{key:p.id,
                onClick:()=>setHoleDecision(p.id,false),
                style:{padding:"10px 14px",fontSize:13,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid var(--blue-border)",background:"var(--blue-bg)",color:"var(--blue)"}
              },p.name.split(" ")[0])),
              h("button",{
                onClick:()=>setHoleDecision(null,true),
                style:{padding:"10px 14px",fontSize:13,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid var(--red-border)",background:"var(--red-bg)",color:"var(--red)"}
              },"🐺 LONE WOLF (3x!)")
            )
          ),
          
          // Show current hole decision
          (thisWolfPar||thisWolfLone)&&h("div",{style:{padding:"10px 12px",borderRadius:8,
            background:thisWolfLone?"var(--red-bg)":"var(--blue-bg)",
            border:"1.5px solid "+(thisWolfLone?"var(--red-border)":"var(--blue-border)"),
            marginBottom:10
          }},
            h("p",{style:{fontSize:14,fontWeight:800,color:thisWolfLone?"var(--red)":"var(--blue)",margin:"0 0 4px"}},
              thisWolfLone
                ?"🐺 LONE WOLF — "+wolfPl?.name.split(" ")[0]+" mot ALLE (3x betaling!)"
                :wolfPl?.name.split(" ")[0]+" + "+players.find(p=>p.id===thisWolfPar)?.name.split(" ")[0]+" mot resten"
            ),
            h("button",{
              onClick:()=>setHoleDecision(null,false),
              style:{fontSize:11,color:"var(--muted)",background:"none",border:"none",cursor:"pointer",padding:0}
            },"← Angre valg")
          ),
          
          // Next hole preview
          nextWolf&&h("p",{style:{fontSize:11,color:"var(--muted)",marginBottom:10}},
            "Neste hull → Wolf: "+nextWolf.name.split(" ")[0]
          ),
          
          // Live standings
          h("div",{style:{background:"#080c18",borderRadius:8,padding:"10px 12px"}},
            h("p",{style:{fontSize:10,color:"var(--blue)",fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Stilling"),
            players.slice().sort((a,b)=>wolfScores[b.id]-wolfScores[a.id]).map((p,i)=>
              h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                  h("span",{style:{fontSize:12}},i===0?"🏆":i===1?"🥈":i===2?"🥉":"  "),
                  h("span",{style:{fontSize:13,fontWeight:600,color:"#fff"}},p.name.split(" ")[0]),
                  (hole-1)%players.length===players.indexOf(p)&&h("span",{style:{fontSize:10,color:"var(--blue)",fontWeight:700}}," 🐺")
                ),
                h("span",{style:{fontSize:14,fontWeight:800,
                  color:wolfScores[p.id]>0?"var(--green)":wolfScores[p.id]<0?"var(--red)":"var(--muted)"}},
                  (wolfScores[p.id]>0?"+":"")+wolfScores[p.id]+(money?"kr":"p")
                )
              )
            )
          )
        );
      }

      if(gid==="nines"){
        const nP=Math.min(players.length,4);
        const ps=players.slice(0,nP);
        const map={};ps.forEach(p=>map[p.id]=0);
        for(let hh=1;hh<hole;hh++){
          const hs=ps.map(p=>({id:p.id,s:netFor(p.id,hh)})).filter(x=>x.s!=null);
          if(hs.length<2)continue;
          hs.sort((a,b)=>a.s-b.s);
          if(hs.length===3){
            const[a,b_,c]=hs;
            if(a.s<b_.s&&b_.s<c.s){map[a.id]+=5;map[b_.id]+=3;map[c.id]+=1;}
            else if(a.s===b_.s&&b_.s<c.s){map[a.id]+=4;map[b_.id]+=4;map[c.id]+=1;}
            else if(a.s<b_.s&&b_.s===c.s){map[a.id]+=5;map[b_.id]+=2;map[c.id]+=2;}
            else{map[a.id]+=3;map[b_.id]+=3;map[c.id]+=3;}
          }else if(hs.length>=4){
            const pts=[4,3,2,0];let i=0;
            while(i<hs.length){let j=i;while(j<hs.length&&hs[j].s===hs[i].s)j++;const avg=pts.slice(i,j).reduce((a,b)=>a+b,0)/(j-i);for(let k=i;k<j;k++)map[hs[k].id]+=Math.round(avg*10)/10;i=j;}
          }
        }
        const sorted=ps.slice().sort((a,b)=>map[b.id]-map[a.id]);
        const hsSc=ps.map(p=>({p,s:netFor(p.id,hole)})).filter(x=>x.s!=null).sort((a,b)=>a.s-b.s);
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:0,letterSpacing:"0.1em",textTransform:"uppercase"}},"🎯 NINES"),infoBtn),
          info,
          h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.4}},
            nP===3?"9 poeng per hull: 5-3-1 (klare plasser). Likt deles.":"9 poeng per hull: 4-3-2-0 (klare). Likt deles mellom like."),
          hsSc.length>0&&h("div",{style:{display:"flex",gap:6,marginBottom:10}},
            hsSc.map((x,i)=>h("div",{key:x.p.id,style:{padding:"6px 10px",borderRadius:8,
              background:i===0?"var(--blue-bg)":i===hsSc.length-1?"var(--red-bg)":"var(--bg3)",
              border:"1px solid "+(i===0?"var(--blue-border)":i===hsSc.length-1?"var(--red-border)":"var(--border)")}},
              h("p",{style:{margin:0,fontSize:12,fontWeight:800,color:i===0?"var(--blue)":i===hsSc.length-1?"var(--red)":"var(--muted)"}},x.p.name.split(" ")[0]),
              h("p",{style:{margin:0,fontSize:11,color:"var(--muted)"}},x.s+" slag")
            ))
          ),
          h("div",{style:{background:"#080c18",borderRadius:8,padding:"10px 12px"}},
            h("p",{style:{fontSize:10,color:"var(--blue)",fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Poengstilling"),
            sorted.map((p,i)=>h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("span",{style:{fontSize:12}},i===0?"🏆":i===1?"🥈":i===2?"🥉":"  "),
                h("span",{style:{fontSize:13,fontWeight:600,color:"#fff"}},p.name.split(" ")[0])
              ),
              h("div",{style:{textAlign:"right"}},
                h("span",{style:{fontSize:16,fontWeight:800,color:"var(--blue)"}},(map[p.id]||0)+"p"),
                money&&h("span",{style:{fontSize:11,color:"var(--gold)",marginLeft:6}},"~"+(Math.round((map[p.id]||0))*uval)+"kr")
              )
            ))
          )
        );
      }

      if(gid==="high_low"){
        const hlMoney={};players.forEach(p=>hlMoney[p.id]=0);
        const bet=money?uval:1;
        for(let hh=1;hh<hole;hh++){
          const hs=players.map(p=>({p,s:netFor(p.id,hh)})).filter(x=>x.s!=null);
          if(hs.length<2)continue;
          const maxS=Math.max(...hs.map(x=>x.s));
          const minS=Math.min(...hs.map(x=>x.s));
          if(maxS===minS)continue;
          const losers=hs.filter(x=>x.s===maxS);
          const winners=hs.filter(x=>x.s===minS);
          if(losers.length===1&&winners.length===1){hlMoney[losers[0].p.id]-=bet;hlMoney[winners[0].p.id]+=bet;}
        }
        const hsSc=players.map(p=>({p,s:netFor(p.id,hole)})).filter(x=>x.s!=null);
        const maxSC=hsSc.length?Math.max(...hsSc.map(x=>x.s)):null;
        const minSC=hsSc.length?Math.min(...hsSc.map(x=>x.s)):null;
        const curLosers=hsSc.filter(x=>x.s===maxSC);
        const curWinners=hsSc.filter(x=>x.s===minSC&&minSC!==maxSC);
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:0,letterSpacing:"0.1em",textTransform:"uppercase"}},"⬆️⬇️ HIGH-LOW"),infoBtn),
          info,
          h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.4}},"Høyest slag betaler lavest slag "+(money?bet+"kr":"1p")+" per hull. Midtplasseringer er trygge."),
          maxSC!=null&&maxSC!==minSC&&h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
            h("div",{style:{padding:"8px 10px",background:"var(--red-bg)",borderRadius:8,border:"1px solid var(--red-border)"}},
              h("p",{style:{fontSize:10,color:"var(--red)",fontWeight:800,margin:"0 0 3px",textTransform:"uppercase"}},"⬆️ Betaler"),
              curLosers.map(x=>h("p",{key:x.p.id,style:{margin:0,fontSize:13,fontWeight:700,color:"var(--red)"}},x.p.name.split(" ")[0]+" ("+x.s+")"))
            ),
            h("div",{style:{padding:"8px 10px",background:"var(--accent-bg)",borderRadius:8,border:"1px solid var(--accent-border)"}},
              h("p",{style:{fontSize:10,color:"var(--accent)",fontWeight:800,margin:"0 0 3px",textTransform:"uppercase"}},"⬇️ Mottar"),
              curWinners.map(x=>h("p",{key:x.p.id,style:{margin:0,fontSize:13,fontWeight:700,color:"var(--accent)"}},x.p.name.split(" ")[0]+" ("+x.s+")"))
            )
          ),
          maxSC!=null&&maxSC===minSC&&h("p",{style:{color:"var(--muted)",fontSize:13,marginBottom:10}},"🤝 Alle likt — ingen betaling"),
          maxSC!=null&&maxSC!==minSC&&(curLosers.length>1||curWinners.length>1)&&h("p",{style:{color:"var(--gold)",fontSize:12,marginBottom:10,fontWeight:600,lineHeight:1.4}},"🤝 Flere delt på "+(curLosers.length>1&&curWinners.length>1?"høyest og lavest":curLosers.length>1?"høyest":"lavest")+" — ingen betaling dette hullet (kun rein topp mot rein bunn betaler)"),
          h("div",{style:{background:"#080c18",borderRadius:8,padding:"10px 12px"}},
            h("p",{style:{fontSize:10,color:"var(--blue)",fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Saldo"),
            players.slice().sort((a,b)=>hlMoney[b.id]-hlMoney[a.id]).map((p,i)=>
              h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",padding:"3px 0"}},
                h("span",{style:{fontSize:13,fontWeight:600,color:"#fff"}},p.name.split(" ")[0]),
                h("span",{style:{fontSize:14,fontWeight:800,color:hlMoney[p.id]>0?"var(--green)":hlMoney[p.id]<0?"var(--red)":"var(--muted)"}},
                  (hlMoney[p.id]>0?"+":"")+hlMoney[p.id]+(money?"kr":"p"))
              )
            )
          )
        );
      }


      // ── BINGO BANGO BONGO ────────────────────────────────────────────
      if(gid==="bingo"){
        const bc=bingoClaims[hole]||{};
        const tot={};players.forEach(p=>tot[p.id]=0);
        Object.values(bingoClaims).forEach(s=>{
          if(s.bingo&&tot[s.bingo]!==undefined)tot[s.bingo]++;
          if(s.bango&&tot[s.bango]!==undefined)tot[s.bango]++;
          if(s.bongo&&tot[s.bongo]!==undefined)tot[s.bongo]++;
        });
        const moneyTot={};players.forEach(p=>moneyTot[p.id]=(tot[p.id]||0)*(money?uval:1));
        const claim=(type,pid)=>setBingoClaims(prev=>({...prev,[hole]:{...(prev[hole]||{}),[type]:bc[type]===pid?null:pid}}));
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,
              h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:"0 0 2px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🎯 BINGO BANGO BONGO"),
              h("p",{style:{fontSize:12,color:"var(--muted)",margin:0}},"3 poeng per hull")
            ),infoBtn
          ),
          info,
          ["bingo","bango","bongo"].map(type=>h("div",{key:type,style:{marginBottom:10}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
              h("p",{style:{fontSize:12,fontWeight:800,color:"var(--blue)",textTransform:"uppercase",letterSpacing:"0.08em",margin:0,minWidth:70}},
                type==="bingo"?"🥇 BINGO":type==="bango"?"📍 BANGO":"🏁 BONGO"),
              h("p",{style:{fontSize:11,color:"var(--muted)",margin:0}},
                type==="bingo"?"Første ball på grønn":type==="bango"?"Nærmest flagget":"Første i hullet")
            ),
            h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              players.map(p=>h("button",{key:p.id,
                onClick:()=>claim(type,p.id),
                style:{padding:"8px 12px",fontSize:13,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid "+(bc[type]===p.id?"var(--blue)":"var(--border2)"),
                  background:bc[type]===p.id?"var(--blue-bg)":"var(--bg3)",
                  color:bc[type]===p.id?"var(--blue)":"var(--muted)"}
              },bc[type]===p.id?"✓ "+p.name.split(" ")[0]:p.name.split(" ")[0]))
            )
          )),
          h("div",{style:{background:"#080c18",borderRadius:8,padding:"10px 12px"}},
            h("p",{style:{fontSize:10,color:"var(--blue)",fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Stilling"),
            players.slice().sort((a,b)=>tot[b.id]-tot[a.id]).map((p,i)=>
              h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",padding:"3px 0"}},
                h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                  h("span",{style:{fontSize:12}},i===0?"🏆":i===1?"🥈":i===2?"🥉":"  "),
                  h("span",{style:{fontSize:13,fontWeight:600,color:"#fff"}},p.name.split(" ")[0])
                ),
                h("div",null,
                  h("span",{style:{fontSize:14,fontWeight:800,color:"var(--blue)"}},(tot[p.id]||0)+"p"),
                  money&&h("span",{style:{fontSize:11,color:"var(--gold)",marginLeft:6}},(moneyTot[p.id]||0)+"kr")
                )
              )
            )
          )
        );
      }

      // ── JOKER GOLF ───────────────────────────────────────────────────────
      if(gid==="joker"){
        // Give each player 3 joker cards if not done
        const JCARDS=["replay","double","shield","bomb"];
        // Init kun naar ingen spillere har faatt kort enno (unngaa reset naar kort spilles opp)
        const anyInitialized=players.some(p=>jokerCards[p.id]!==undefined);
        if(!anyInitialized&&players.length>0){
          const init={};
          // Hver spiller faar 4 jokerkort: replay, double, shield, bomb
          players.forEach(p=>{init[p.id]=["replay","double","shield","bomb"];});
          setJokerCards(init);
        }
        // Matchplay score: track hole wins
        const jScore={};players.forEach(p=>jScore[p.id]=0);
        for(let hh=1;hh<hole;hh++){
          const hs=players.map(p=>({id:p.id,s:netFor(p.id,hh)})).filter(x=>x.s!=null);
          if(hs.length<2)continue;
          const mn=Math.min(...hs.map(x=>x.s));
          const ws=hs.filter(x=>x.s===mn);
          if(ws.length===1)jScore[ws[0].id]++;
        }
        const CARD_LABELS={"replay":"↩️ REPLAY","double":"⚡ DOUBLE","shield":"🛡️ SHIELD","bomb":"💣 BOMB"};
        const CARD_DESC={"replay":"Tving motstander til å slå om","double":"Doble hull-verdien","shield":"Beskytt ditt resultat","bomb":"Din birdie/par er verdt dobbelt"};
        return h("div",{className:"card cd"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,
              h("p",{style:{fontSize:11,fontWeight:800,color:"var(--red)",margin:"0 0 2px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🃏 JOKER GOLF"),
              h("p",{style:{fontSize:12,color:"var(--muted)",margin:0}},"Matchplay med jokerkort")
            ),infoBtn
          ),
          info,
          // Joker cards per player
          players.map(p=>{
            const cards=jokerCards[p.id]||[];
            return h("div",{key:p.id,style:{marginBottom:10,padding:"10px 12px",background:"rgba(201,84,68,0.06)",borderRadius:10,border:"1px solid rgba(201,84,68,0.2)"}},
              h("p",{style:{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:6}},p.name.split(" ")[0]),
              cards.length>0
                ? h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                    cards.map((card,i)=>h("button",{key:i,
                      onClick:()=>{
                        if(!confirm("Spill "+CARD_LABELS[card]+": "+CARD_DESC[card]))return;
                        setJokerCards(prev=>({...prev,[p.id]:prev[p.id].filter((_,j)=>j!==i)}));
                      },
                      style:{padding:"6px 10px",fontSize:12,fontWeight:700,borderRadius:8,cursor:"pointer",
                        border:"1.5px solid var(--red-border)",background:"var(--red-bg)",color:"var(--red)"}
                    },CARD_LABELS[card]||card))
                  )
                : h("p",{style:{fontSize:12,color:"var(--muted)",fontStyle:"italic"}},"Ingen kort igjen")
            );
          }),
          // Matchplay standings
          h("div",{style:{background:"#080c18",borderRadius:8,padding:"10px 12px"}},
            h("p",{style:{fontSize:10,color:"var(--red)",fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Matchplay hull vunnet"),
            players.slice().sort((a,b)=>jScore[b.id]-jScore[a.id]).map((p,i)=>
              h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",padding:"3px 0"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                  h("span",{style:{fontSize:12}},i===0?"🏆":i===1?"🥈":i===2?"🥉":"  "),
                  h("span",{style:{fontSize:13,fontWeight:600,color:"#fff"}},p.name.split(" ")[0])
                ),
                h("span",{style:{fontSize:14,fontWeight:800,color:"var(--red)"}},(jScore[p.id]||0)+" hull")
              )
            )
          )
        );
      }

      // ── BANKER ─────────────────────────────────────────────────────────
      if(gid==="banker"){
        const bankPl=players[bankerIdx%players.length];
        const others=players.filter(p=>p.id!==bankPl.id);
        // Calculate: bank vs each opponent per hole
        const bankResults=[];
        // Tell ALLE spilte hull (inkl. inneværende) — samme spenn som gameT()
        // sin banker-utregning, så panel-saldoen matcher penge-chipsene på score-korta.
        for(let hh=1;hh<=hc;hh++){
          const bS=netFor(bankPl.id,hh);
          if(bS==null)continue;
          others.forEach(op=>{
            const oS=netFor(op.id,hh);
            if(oS==null)return;
            const diff=bS-oS; // neg = banker wins
            const amt=money?uval:1;
            bankResults.push({hh,op:op.name.split(" ")[0],diff,amt,bankerWins:diff<0,tie:diff===0});
          });
        }
        const bankerTotal=bankResults.reduce((s,r)=>s+(r.bankerWins?r.amt:r.tie?0:-r.amt),0);
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,
              h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:"0 0 2px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🏦 Banker"),
              h("p",{style:{fontSize:15,fontWeight:800,color:"#fff",margin:0}},bankPl.name.split(" ")[0]+" er Banker — Hull "+hole)
            ),
            infoBtn
          ),
          info,
          // Next banker selector — who is banker next hole?
          h("div",{style:{marginBottom:12}},
            h("p",{style:{fontSize:11,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Neste hull — velg banker:"),
            h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              players.map(p=>h("button",{key:p.id,
                onClick:()=>setBankerIdx(players.indexOf(p)),
                style:{padding:"8px 14px",fontSize:13,fontWeight:700,borderRadius:8,cursor:"pointer",
                  border:"1.5px solid "+(players.indexOf(p)===bankerIdx%players.length?"var(--blue)":"var(--border2)"),
                  background:players.indexOf(p)===bankerIdx%players.length?"var(--blue-bg)":"var(--bg3)",
                  color:players.indexOf(p)===bankerIdx%players.length?"var(--blue)":"var(--muted)"}
              },p.name.split(" ")[0]))
            )
          ),
          // Live money status
          money&&h("div",{style:{padding:"10px 12px",background:"var(--amber-bg)",borderRadius:10,border:"1px solid var(--amber-border)",marginBottom:10}},
            h("p",{style:{fontSize:11,color:"var(--gold)",fontWeight:800,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}},"💰 Banker saldo"),
            h("p",{style:{fontSize:24,fontWeight:900,color:bankerTotal>=0?"var(--green)":"var(--red)",margin:0}},
              (bankerTotal>=0?"+":"")+bankerTotal+(money?"kr":"p"))
          ),
          // Per-hole vs opponents
          bankResults.length>0&&h("div",null,
            bankResults.slice(-3).map((r,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",color:"var(--muted)"}},
              h("span",null,"H"+r.hh+" vs "+r.op),
              h("span",{style:{color:r.bankerWins?"var(--green)":r.tie?"var(--muted)":"var(--red)",fontWeight:700}},
                r.bankerWins?(money?"+"+r.amt+"kr":"+1"):(r.tie?"0":(money?"-"+r.amt+"kr":"-1")))
            ))
          ),
          hMin!=null&&h("div",{style:{marginTop:8,padding:8,background:"var(--blue-bg)",borderRadius:8,fontSize:13,fontWeight:700,color:"var(--blue)"}},
            hWin?"🎯 Hull "+hole+": "+hWin.name.split(" ")[0]+" vinner!":tied?"🤝 Uavgjort":"Registrer score"
          )
        );
      }

      // ── SIXES ──────────────────────────────────────────────────────────
      if(gid==="sixes"){
        // 4 players, switch partners every 6 holes
        // H1-6: A+B vs C+D, H7-12: A+C vs B+D, H13-18: A+D vs B+C
        const [p0,p1,p2,p3]=[players[0],players[1],players[2],players[3]].filter(Boolean);
        if(players.length!==4){
          return h("div",{className:"card ci"},
            h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:"0 0 8px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🔀 Sixes"),
            h("p",{style:{fontSize:14,fontWeight:700,color:"var(--red)",margin:"0 0 4px"}},"⚠️ Sixes krever nøyaktig 4 spillere"),
            h("p",{style:{fontSize:13,color:"var(--muted)",margin:0,lineHeight:1.4}},"Dere er "+players.length+" spillere nå. Sixes bytter lag hver 6. hull (2 mot 2), så det fungerer kun med 4. Gå tilbake og velg et annet spill, eller juster antall spillere.")
          );
        }
        const period=hole<=6?0:hole<=12?1:2;
        const PARTNERSHIPS=[
          [p0?.id,p1?.id],[p2?.id,p3?.id],  // H1-6
          [p0?.id,p2?.id],[p1?.id,p3?.id],  // H7-12
          [p0?.id,p3?.id],[p1?.id,p2?.id],  // H13-18
        ];
        const teamA=PARTNERSHIPS[period*2];
        const teamB=PARTNERSHIPS[period*2+1];
        const nameOf=id=>players.find(p=>p.id===id)?.name.split(" ")[0]||"?";

        // Calculate team scores per hole
        const teamScores={a:0,b:0};
        for(let hh=1;hh<hole;hh++){
          const ph=hh<=6?0:hh<=12?1:2;
          const tA=PARTNERSHIPS[ph*2], tB=PARTNERSHIPS[ph*2+1];
          const sA=tA.reduce((sum,id)=>{const s=netFor(id,hh);return s!=null?sum+s:null},0);
          const sB=tB.reduce((sum,id)=>{const s=netFor(id,hh);return s!=null?sum+s:null},0);
          if(sA!=null&&sB!=null){
            if(sA<sB)teamScores.a+=money?uval:1;
            else if(sB<sA)teamScores.b+=money?uval:1;
          }
        }
        const manualTeams=sixesTeams[hole];
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,
              h("p",{style:{fontSize:11,color:"var(--blue)",fontWeight:800,margin:"0 0 2px",letterSpacing:"0.1em",textTransform:"uppercase"}},"🔀 Sixes — Hull "+hole),
              h("p",{style:{fontSize:12,color:"var(--muted)",margin:0}},hole<=6?"Periode 1 (H1-6)":hole<=12?"Periode 2 (H7-12)":"Periode 3 (H13-18)")
            ),
            infoBtn
          ),
          info,
          // Current teams
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
            h("div",{style:{background:"rgba(90,143,184,0.12)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(90,143,184,0.3)"}},
              h("p",{style:{fontSize:10,color:"var(--blue)",fontWeight:800,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}},"Lag A"),
              h("p",{style:{fontSize:14,fontWeight:700,color:"#fff",margin:0}},teamA.map(nameOf).join(" + ")),
              money&&h("p",{style:{fontSize:16,fontWeight:900,color:"var(--blue)",margin:"4px 0 0"}},teamScores.a+(money?"kr":"p")+" tot")
            ),
            h("div",{style:{background:"rgba(201,84,68,0.12)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(201,84,68,0.3)"}},
              h("p",{style:{fontSize:10,color:"var(--red)",fontWeight:800,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}},"Lag B"),
              h("p",{style:{fontSize:14,fontWeight:700,color:"#fff",margin:0}},teamB.map(nameOf).join(" + ")),
              money&&h("p",{style:{fontSize:16,fontWeight:900,color:"var(--red)",margin:"4px 0 0"}},teamScores.b+(money?"kr":"p")+" tot")
            )
          ),
          hMin!=null&&h("div",{style:{padding:8,background:"var(--blue-bg)",borderRadius:8,fontSize:13,fontWeight:700,color:"var(--blue)"}},
            hWin?"🎯 Hull "+hole+": "+hWin.name.split(" ")[0]+" vinner!":tied?"🤝 Uavgjort":"Registrer score"
          )
        );
      }

      // ── SCRAMBLE (beste-ball lag) ───────────────────────────────────────
      if(gid==="scramble"){
        const parOf=hh=>hp[String(hh)]||HOLE_PARS[hh]||4;
        const teams=players.length===4
          ?[{name:"Lag A",col:"var(--blue)",bg:"rgba(90,143,184,0.12)",bd:"rgba(90,143,184,0.3)",members:[players[0],players[1]]},
            {name:"Lag B",col:"var(--red)",bg:"rgba(201,84,68,0.12)",bd:"rgba(201,84,68,0.3)",members:[players[2],players[3]]}]
          :[{name:"Laget",col:"var(--accent)",bg:"var(--accent-bg)",bd:"var(--accent-border)",members:players}];
        const calc=mem=>{let tot=0,parTot=0,cnt=0;for(let hh=1;hh<=hc;hh++){const vals=mem.map(p=>netFor(p.id,hh)).filter(v=>v!=null);if(!vals.length)continue;tot+=Math.min(...vals);parTot+=parOf(hh);cnt++;}return{tot,parTot,cnt,rel:tot-parTot};};
        const curBest=mem=>{const vals=mem.map(p=>netFor(p.id,hole)).filter(v=>v!=null);return vals.length?Math.min(...vals):null;};
        const relStr=r=>r===0?"E":r>0?"+"+r:""+r;
        const relCol=r=>r<0?"var(--green)":r>0?"var(--red)":"var(--muted)";
        const td=teams.map(t=>Object.assign({},t,calc(t.members),{cur:curBest(t.members)}));
        let lead=null;
        if(td.length>1&&(td[0].cnt>0||td[1].cnt>0)){
          if(td[0].rel<td[1].rel)lead=td[0];else if(td[1].rel<td[0].rel)lead=td[1];
        }
        return h("div",{className:"card ci"},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("p",{style:{fontSize:11,fontWeight:800,color:"var(--blue)",margin:0,letterSpacing:"0.1em",textTransform:"uppercase"}},"🏌️ SCRAMBLE — Hull "+hole),infoBtn),
          info,
          h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.4}},"Beste (laveste) ball per hull teller for laget. Lavest total mot par vinner. Hver spiller logger sitt slag — appen velger den beste."),
          h("div",{style:{display:"grid",gridTemplateColumns:td.length>1?"1fr 1fr":"1fr",gap:8,marginBottom:lead!=null||td.length>1?12:0}},
            td.map(t=>h("div",{key:t.name,style:{background:t.bg,borderRadius:10,padding:"10px 12px",border:"1px solid "+t.bd}},
              h("p",{style:{fontSize:10,color:t.col,fontWeight:800,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}},t.name),
              h("p",{style:{fontSize:13,fontWeight:700,color:"#fff",margin:"0 0 6px"}},t.members.map(p=>p.name.split(" ")[0]).join(" + ")||"—"),
              h("div",{style:{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}},
                h("span",{style:{fontSize:22,fontWeight:900,color:t.col}},t.cnt>0?t.tot:"—"),

            ))

          lead&&h("div",{style:{padding:8,background:"var(--blue-bg)",borderRadius:8,fontSize:13,fontWeight:700,color:"var(--blue)"}},"🏆 "+lead.name+" leder med "+Math.abs(td[0].rel-td[1].rel)+" slag"),
          td.length>1&&!lead&&(td[0].cnt>0||td[1].cnt>0)&&h("div",{style:{padding:8,background:"var(--blue-bg)",borderRadius:8,fontSize:13,fontWeight:700,color:"var(--blue)"}},"🤝 Likt mellom lagene")
        );
      }

      // ── GENERIC fallback ───────────────────────────────────────────────
      return h("div",{className:"card ci"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},h("p",{style:{fontSize:13,fontWeight:800,letterSpacing:1.2,color:"#4d9fff",margin:0}},gObj.label.toUpperCase()),infoBtn),
        info,
        h("p",{style:{fontSize:14,fontWeight:700,color:"#4d9fff",margin:"0 0 6px"}},"Mål: "+gObj.short),
        hMin!=null&&h("p",{style:{fontSize:14,fontWeight:800,color:"#4d9fff"}},hWin?"🎯 Hull "+hole+": "+hWin.name.split(" ")[0]+" vinner!":tied?"🤝 Hull "+hole+": Uavgjort":"Registrer score for å se resultat")
      );
    }

    return h("div",{className:"sb-screen",key:"s_"+scr,style:{position:"relative",minHeight:"100vh",background:"var(--bg)"}},
      h(PhotoBg,{screenKey:"ingame"}),
      h("div",{style:{position:"relative",zIndex:1,padding:"0 0 4rem"}},
      // TOP BAR
      h("div",{style:{background:"#0a0a0a",borderBottom:"1px solid #222",padding:"10px 0",marginBottom:12,position:"sticky",top:0,zIndex:10,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}},
        h("div",{style:{display:"flex",justifyContent:"center",gap:3,marginBottom:8,flexWrap:"wrap",padding:"0 4px"}},
          Array.from({length:hc},(_,i)=>{
            const hh=i+1,hasS=players.some(p=>scores[p.id]?.[hh]),isCur=hh===hole;
            return h("button",{key:hh,onClick:()=>{setHole(hh);setSset(false);setShowPar(false);setShowGI(false);},style:{width:isCur?38:28,height:32,borderRadius:14,fontSize:13,fontWeight:isCur?800:500,border:isCur?"2px solid var(--accent)":"1.5px solid "+(hasS?"var(--accent-border)":"#2e3248"),cursor:"pointer",background:isCur?"var(--accent)":hasS?"var(--accent-bg)":"var(--bg3)",color:isCur?"var(--accent-text)":hasS?"var(--accent)":"#8890b8"}},hh);
          })
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"0 4px"}},
          h("button",{onClick:()=>setHole(x=>Math.max(1,x-1)),disabled:hole===1,style:{width:48,height:48,flexShrink:0,fontSize:22,borderRadius:10,border:"1.5px solid var(--border2)",background:"var(--bg3)",color:hole===1?"#2e3248":"#c8ccee",cursor:hole===1?"default":"pointer"}},"‹"),
          h("div",{style:{flex:1,textAlign:"center"}},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
              h("p",{style:{margin:0,fontSize:22,fontWeight:900}},"Hull "+hole),
              h("button",{onClick:()=>setShowPar(!showPar),style:{fontSize:14,padding:"5px 12px",borderRadius:10,border:"1.5px solid "+(showPar?"#4d9fff":"#2e3248"),background:showPar?"#0a1a3a":"var(--bg3)",color:showPar?"#4d9fff":"#8890b8",fontWeight:700,cursor:"pointer"}},"Par "+holePar+" ✎")
            ),
            gObj&&h("p",{style:{margin:0,fontSize:11,color:"#5a6080",fontWeight:600}},gObj.label)
          ),
          h("button",{onClick:()=>setHole(x=>Math.min(hc,x+1)),disabled:hole===hc,style:{width:48,height:48,flexShrink:0,fontSize:22,borderRadius:10,border:"1.5px solid var(--border2)",background:"var(--bg3)",color:hole===hc?"#2e3248":"#c8ccee",cursor:hole===hc?"default":"pointer"}},"›"),
          h("button",{onClick:()=>{setSset(!sset);setShowPar(false);},style:{width:48,height:48,flexShrink:0,fontSize:18,borderRadius:10,border:"1.5px solid "+(sset?"#4d9fff":"#2e3248"),background:sset?"#0a1a3a":"var(--bg3)",cursor:"pointer"}},"⚙")
        )
      ),

      showPar&&h("div",{className:"card ci",style:{marginBottom:12}},
        h("p",{style:{fontSize:13,fontWeight:800,margin:"0 0 10px",color:"var(--blue)"}},"✎ Par alle hull — trykk hull for å endre"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:4,marginBottom:hc>9?8:0}},
          Array.from({length:Math.min(9,hc)},(_,i)=>{
            const hNum=i+1,par=hp[String(hNum)]||HOLE_PARS[hNum]||4,isCur=hNum===hole;
            return h("div",{key:hNum,style:{textAlign:"center"}},
              h("p",{style:{margin:"0 0 3px",fontSize:9,fontWeight:700,color:isCur?"var(--blue)":"var(--text3)"}},"H"+hNum),
              h("button",{onClick:()=>setHp(x=>({...x,[String(hNum)]:Math.max(3,(x[String(hNum)]||HOLE_PARS[hNum]||4)-1)})),style:{display:"block",width:"100%",padding:"2px 0",fontSize:11,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:"5px 5px 0 0",color:"var(--text2)",cursor:"pointer",fontWeight:700}},"−"),
              h("div",{style:{padding:"5px 0",fontSize:16,fontWeight:900,background:isCur?"rgba(90,143,184,0.15)":"var(--bg2)",color:isCur?"var(--blue)":"var(--text)",border:"1px solid "+(isCur?"var(--blue-border)":"var(--border2)"),borderTop:"none",borderBottom:"none",textAlign:"center"}},par),
              h("button",{onClick:()=>setHp(x=>({...x,[String(hNum)]:Math.min(6,(x[String(hNum)]||HOLE_PARS[hNum]||4)+1)})),style:{display:"block",width:"100%",padding:"2px 0",fontSize:11,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:"0 0 5px 5px",color:"var(--text2)",cursor:"pointer",fontWeight:700}},"+")
            );
          })
        ),
        hc>9&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:4}},
          Array.from({length:hc-9},(_,i)=>{
            const hNum=i+10,par=hp[String(hNum)]||HOLE_PARS[hNum]||4,isCur=hNum===hole;
            return h("div",{key:hNum,style:{textAlign:"center"}},
              h("p",{style:{margin:"0 0 3px",fontSize:9,fontWeight:700,color:isCur?"var(--blue)":"var(--text3)"}},"H"+hNum),
              h("button",{onClick:()=>setHp(x=>({...x,[String(hNum)]:Math.max(3,(x[String(hNum)]||HOLE_PARS[hNum]||4)-1)})),style:{display:"block",width:"100%",padding:"2px 0",fontSize:11,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:"5px 5px 0 0",color:"var(--text2)",cursor:"pointer",fontWeight:700}},"−"),
              h("div",{style:{padding:"5px 0",fontSize:16,fontWeight:900,background:isCur?"rgba(90,143,184,0.15)":"var(--bg2)",color:isCur?"var(--blue)":"var(--text)",border:"1px solid "+(isCur?"var(--blue-border)":"var(--border2)"),borderTop:"none",borderBottom:"none",textAlign:"center"}},par),
              h("button",{onClick:()=>setHp(x=>({...x,[String(hNum)]:Math.min(6,(x[String(hNum)]||HOLE_PARS[hNum]||4)+1)})),style:{display:"block",width:"100%",padding:"2px 0",fontSize:11,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:"0 0 5px 5px",color:"var(--text2)",cursor:"pointer",fontWeight:700}},"+")
            );
